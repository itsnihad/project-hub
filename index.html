<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Safeguard against libraries trying to overwrite window.fetch
      // in environments where it's read-only (like shared iframes)
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked attempt to overwrite window.fetch'); }
            });
          }
        } catch (e) {
          console.error('Fetch safeguard failed:', e);
        }
      })();
    </script>
    <title>Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
